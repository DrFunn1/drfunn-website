<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#0d2a18"/>
      <stop offset="100%" stop-color="#050c07"/>
    </radialGradient>
    <radialGradient id="shell" cx="38%" cy="32%">
      <stop offset="0%" stop-color="#4dffaa" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#050c07" stop-opacity="0.6"/>
    </radialGradient>
    <radialGradient id="ball" cx="33%" cy="28%">
      <stop offset="0%" stop-color="#d4e0ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#1a1a50" stop-opacity="0.88"/>
    </radialGradient>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#ff9030" stroke-width="1.2" stroke-opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Floor line -->
  <line x1="20" y1="268" x2="380" y2="268" stroke="#1a3622" stroke-width="1.5"/>

  <!-- Contact patch -->
  <ellipse cx="170" cy="268" rx="18" ry="3" fill="#ff503c" fill-opacity="0.35" stroke="#ff503c" stroke-width="0.8"/>

  <!-- Shell circle ~90px radius -->
  <circle cx="170" cy="178" r="90" fill="url(#shell)" stroke="#4dffaa" stroke-width="1.2" stroke-opacity="0.42"/>

  <!-- Pipe assembly (slightly tilted ~-12deg) -->
  <g transform="rotate(-12, 170, 178)">
    <!-- Recirc dashed line -->
    <line x1="50" y1="169" x2="290" y2="169" stroke="#4dffaa" stroke-width="1.5" stroke-dasharray="5,4" stroke-opacity="0.18"/>

    <!-- Pipe OD -->
    <rect x="50" y="172" width="240" height="12" rx="2" fill="#091508" stroke="#4dffaa" stroke-width="0.8" stroke-opacity="0.28"/>

    <!-- End cap zones -->
    <rect x="50"  y="172" width="42" height="12" fill="url(#hatch)" stroke="#ff9030" stroke-width="0.8" stroke-opacity="0.6"/>
    <rect x="248" y="172" width="42" height="12" fill="url(#hatch)" stroke="#ff9030" stroke-width="0.8" stroke-opacity="0.6"/>

    <!-- Bore ID -->
    <rect x="50" y="174" width="240" height="8" fill="#050c07" stroke="#4dffaa" stroke-width="0.3" stroke-opacity="0.12"/>

    <!-- Traverse tick marks -->
    <line x1="92"  y1="173" x2="92"  y2="183" stroke="#4dffaa" stroke-width="0.8" stroke-dasharray="2,2" stroke-opacity="0.5"/>
    <line x1="248" y1="173" x2="248" y2="183" stroke="#4dffaa" stroke-width="0.8" stroke-dasharray="2,2" stroke-opacity="0.5"/>

    <!-- Steel ball (offset from center) -->
    <circle cx="218" cy="178" r="5.5" fill="url(#ball)" stroke="#5858a8" stroke-width="0.9"/>
  </g>

  <!-- Human silhouette (simple, right side) -->
  <g opacity="0.34" fill="#4dffaa">
    <ellipse cx="338" cy="192" rx="7" ry="8"/>       <!-- head -->
    <rect x="335.5" y="200" width="5" height="4"/>   <!-- neck -->
    <polygon points="325,204 351,204 347,224 329,224"/> <!-- torso -->
    <rect x="321" y="205" width="4" height="17" rx="2"/> <!-- arm L -->
    <rect x="351" y="205" width="4" height="17" rx="2"/> <!-- arm R -->
    <rect x="328" y="224" width="6" height="20" rx="2"/> <!-- leg L -->
    <rect x="338" y="224" width="6" height="20" rx="2"/> <!-- leg R -->
    <ellipse cx="331" cy="267" rx="6" ry="2.5"/>
    <ellipse cx="341" cy="267" rx="6" ry="2.5"/>
  </g>
  <text x="338" y="278" text-anchor="middle" fill="#1a3820" font-size="7" font-family="monospace">5' 6"</text>

  <!-- Title block -->
  <text x="20" y="36" fill="#4dffaa" font-size="22" font-family="'Courier New', monospace" font-weight="bold" letter-spacing="0.04em">BallBot</text>
  <text x="20" y="54" fill="#2a6840" font-size="11" font-family="monospace" letter-spacing="0.08em">PHYSICS EXPLORER</text>

  <!-- Annotation: dia + weight -->
  <text x="170" y="72" text-anchor="middle" fill="#4dffaa" font-size="10" font-family="monospace">dia 36" · 14.2 lb</text>

  <!-- Torque bar -->
  <text x="20" y="292" fill="#2a5838" font-size="8" font-family="monospace">TORQUE  gen 28.1 − startup 11.4 = +16.7 lb·in</text>
  <rect x="20" y="280" width="240" height="4" rx="2" fill="#0d1a10"/>
  <rect x="20" y="280" width="140" height="4" rx="2" fill="#4dffaa"/>

  <!-- Border -->
  <rect x="1" y="1" width="398" height="298" rx="3" fill="none" stroke="#4dffaa" stroke-width="0.8" stroke-opacity="0.18"/>
</svg>

