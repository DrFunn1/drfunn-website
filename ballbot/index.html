<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BallBot Physics Explorer · DrFunn</title>

  <!-- Favicon -->
  <link rel="icon" href="/common/drfunn-favicon.png" type="image/png" />

  <!-- Social / OG -->
  <meta property="og:title"       content="BallBot Physics Explorer" />
  <meta property="og:description" content="Interactive sizing tool for a CoM piston-engine spherical robot. Explore pipe length, steel ball torque, contact patch, and live rolling simulation." />
  <meta property="og:image"       content="/ballbot/screenshot.png" />
  <meta property="og:type"        content="website" />
  <meta name="twitter:card"       content="summary_large_image" />
  <meta name="twitter:image"      content="/ballbot/screenshot.png" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />

  <!-- React + ReactDOM (production UMD) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #080f0b; color: #e0ffe8; height: 100%; }
    input[type=range] { -webkit-appearance: none; appearance: none; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { opacity: 1; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="app.js"></script>
</body>
</html>
